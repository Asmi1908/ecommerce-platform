<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopIQ — Cart</title>
<style>
  :root {
    --bg: #07080a;
    --surface: #111218;
    --border: #1c1d22;
    --text: #eceef5;
    --muted: #52546a;
    --accent: #ff6b35;
    --green: #00d4aa;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
  }

  .navbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo { font-size: 20px; font-weight: 700; color: var(--accent); text-decoration: none; }

  .nav-btn {
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    text-decoration: none;
    border: none;
    font-family: 'Segoe UI', sans-serif;
  }

  .nav-btn.outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .nav-btn.primary { background: var(--accent); color: white; }

  .content {
    max-width: 900px;
    margin: 40px auto;
    padding: 0 32px;
  }

  h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
  .subtitle { font-size: 13px; color: var(--muted); margin-bottom: 32px; }

  /* Cart layout */
  .cart-layout {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 24px;
    align-items: start;
  }

  /* Cart items */
  .cart-items { display: flex; flex-direction: column; gap: 12px; }

  .cart-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .item-emoji {
    width: 60px; height: 60px;
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    flex-shrink: 0;
  }

  .item-info { flex: 1; }

  .item-name {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .item-price {
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 4px;
  }

  .item-qty { font-size: 12px; color: var(--muted); }

  .remove-btn {
    background: rgba(255,107,53,0.1);
    color: var(--accent);
    border: 1px solid rgba(255,107,53,0.2);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'Segoe UI', sans-serif;
    transition: opacity 0.2s;
    flex-shrink: 0;
  }

  .remove-btn:hover { opacity: 0.7; }

  /* Order summary */
  .summary {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    position: sticky;
    top: 80px;
  }

  .summary-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 20px;
  }

  .summary-row {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    color: var(--muted);
  }

  .summary-row.total {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    border-bottom: none;
    margin-top: 8px;
  }

  .summary-row.total span:last-child { color: var(--accent); }

  .checkout-btn {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Segoe UI', sans-serif;
    margin-top: 20px;
    transition: opacity 0.2s;
  }

  .checkout-btn:hover { opacity: 0.85; }
  .checkout-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .continue-btn {
    width: 100%;
    padding: 10px;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 13px;
    cursor: pointer;
    font-family: 'Segoe UI', sans-serif;
    margin-top: 10px;
    text-decoration: none;
    display: block;
    text-align: center;
  }

  /* Empty cart */
  .empty-cart {
    text-align: center;
    padding: 80px 32px;
    grid-column: 1 / -1;
  }

  .empty-cart .icon { font-size: 64px; margin-bottom: 20px; }
  .empty-cart h2 { font-size: 22px; margin-bottom: 8px; }
  .empty-cart p { font-size: 14px; color: var(--muted); margin-bottom: 24px; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 20px;
    font-size: 13px;
    opacity: 0;
    pointer-events: none;
    z-index: 999;
    transition: opacity 0.3s, transform 0.3s;
    transform: translateY(10px);
  }

  .toast.show { opacity: 1; pointer-events: auto; transform: translateY(0); }
  .toast.success { border-color: var(--green); color: var(--green); }
  .toast.error { border-color: var(--accent); color: var(--accent); }

  /* Order success */
  .order-success {
    text-align: center;
    padding: 80px 32px;
    display: none;
  }

  .order-success .icon { font-size: 64px; margin-bottom: 20px; }
  .order-success h2 { font-size: 24px; margin-bottom: 8px; color: var(--green); }
  .order-success p { font-size: 14px; color: var(--muted); margin-bottom: 24px; }

  @media (max-width: 768px) {
    .cart-layout { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<nav class="navbar">
  <a class="logo" href="/shop">⚡ ShopIQ</a>
  <div style="display:flex;gap:12px">
    <a href="/shop" class="nav-btn outline">← Continue Shopping</a>
  </div>
</nav>

<div class="content">
  <h1>🛒 Your Cart</h1>
  <p class="subtitle" id="cartSubtitle">Loading your cart...</p>

  <!-- Order success message -->
  <div class="order-success" id="orderSuccess">
    <div class="icon">🎉</div>
    <h2>Order Placed Successfully!</h2>
    <p>Your order has been confirmed. Stock has been updated.</p>
    <a href="/shop" class="nav-btn primary" style="display:inline-block;margin-top:16px;">
      Continue Shopping →
    </a>
  </div>

  <!-- Cart layout -->
  <div class="cart-layout" id="cartLayout">
    <div class="cart-items" id="cartItems">
      <div style="text-align:center;padding:40px;color:#52546a">Loading...</div>
    </div>

    <!-- Order Summary -->
    <div class="summary" id="cartSummary" style="display:none">
      <div class="summary-title">Order Summary</div>
      <div class="summary-row">
        <span>Items</span>
        <span id="summaryItems">0</span>
      </div>
      <div class="summary-row">
        <span>Subtotal</span>
        <span id="summarySubtotal">₹0</span>
      </div>
      <div class="summary-row">
        <span>Shipping</span>
        <span style="color:#00d4aa">Free</span>
      </div>
      <div class="summary-row total">
        <span>Total</span>
        <span id="summaryTotal">₹0</span>
      </div>
      <button class="checkout-btn" onclick="placeOrder()">
        Place Order →
      </button>
      <a href="/shop" class="continue-btn">Continue Shopping</a>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const BASE = 'http://localhost:8000';
  const token = localStorage.getItem('token');

  if (!token) {
    window.location.href = '/login-page';
  }

  let cartData = [];

  let toastTimer = null;
  function showToast(msg, type) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + (type || 'success');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function() { t.classList.remove('show'); }, 3000);
  }

  const categoryEmoji = {
    'electronics': '💻', 'clothing': '👕', 'footwear': '👟', 'accessories': '⌚'
  };

  function getEmoji(name) {
    if (!name) return '📦';
    var lower = name.toLowerCase();
    if (lower.includes('phone') || lower.includes('laptop')) return '💻';
    if (lower.includes('shoe') || lower.includes('boot')) return '👟';
    if (lower.includes('shirt') || lower.includes('jacket')) return '👕';
    return '📦';
  }

  async function loadCart() {
    try {
      var res = await fetch(BASE + '/cart/', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      cartData = await res.json();
      renderCart();
    } catch(e) {
      document.getElementById('cartItems').innerHTML =
        '<div style="text-align:center;padding:40px;color:#52546a">Could not load cart</div>';
    }
  }

  function renderCart() {
    var container = document.getElementById('cartItems');
    var summary = document.getElementById('cartSummary');
    var subtitle = document.getElementById('cartSubtitle');

    if (!cartData.length) {
      subtitle.textContent = 'Your cart is empty';
      container.innerHTML =
        '<div class="empty-cart">' +
        '<div class="icon">🛒</div>' +
        '<h2>Your cart is empty</h2>' +
        '<p>Add some products to get started!</p>' +
        '<a href="/shop" class="nav-btn primary" style="display:inline-block">Browse Products →</a>' +
        '</div>';
      summary.style.display = 'none';
      return;
    }

    subtitle.textContent = cartData.length + ' item' + (cartData.length !== 1 ? 's' : '') + ' in your cart';
    summary.style.display = 'block';

    container.innerHTML = cartData.map(function(item) {
      return '<div class="cart-item">' +
        '<div class="item-emoji">' + getEmoji('') + '</div>' +
        '<div class="item-info">' +
        '<div class="item-name">Product #' + item.product_id + '</div>' +
        '<div class="item-qty">Quantity: ' + item.quantity + '</div>' +
        '</div>' +
        '<button class="remove-btn" onclick="removeItem(' + item.id + ')">Remove</button>' +
        '</div>';
    }).join('');

    // Update summary
    document.getElementById('summaryItems').textContent = cartData.length;
    document.getElementById('summarySubtotal').textContent = 'Calculating...';
    document.getElementById('summaryTotal').textContent = 'Calculating...';
  }

  async function removeItem(id) {
    try {
      await fetch(BASE + '/cart/' + id, {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + token }
      });
      showToast('Item removed from cart');
      loadCart();
    } catch(e) {
      showToast('Could not remove item', 'error');
    }
  }

  async function placeOrder() {
    var btn = document.querySelector('.checkout-btn');
    btn.disabled = true;
    btn.textContent = 'Placing order...';

    try {
      var res = await fetch(BASE + '/orders/', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + token }
      });
      var data = await res.json();

      if (data.id) {
        document.getElementById('cartLayout').style.display = 'none';
        document.getElementById('orderSuccess').style.display = 'block';
        document.getElementById('cartSubtitle').textContent = 'Order #' + data.id + ' confirmed!';
      } else {
        showToast(data.detail || 'Could not place order', 'error');
        btn.disabled = false;
        btn.textContent = 'Place Order →';
      }
    } catch(e) {
      showToast('Error placing order', 'error');
      btn.disabled = false;
      btn.textContent = 'Place Order →';
    }
  }

  loadCart();
</script>
</body>
</html>

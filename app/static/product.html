<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopIQ — Product</title>
<style>
  :root {
    --bg: #07080a;
    --surface: #111218;
    --border: #1c1d22;
    --text: #eceef5;
    --muted: #52546a;
    --accent: #ff6b35;
    --green: #00d4aa;
    --yellow: #ffb830;
    --purple: #7b61ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
  }

  .navbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo { font-size: 20px; font-weight: 700; color: var(--accent); text-decoration: none; }

  .nav-btn {
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    text-decoration: none;
    border: none;
    font-family: 'Segoe UI', sans-serif;
  }

  .nav-btn.outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .nav-btn.primary { background: var(--accent); color: white; }

  .content {
    max-width: 1000px;
    margin: 40px auto;
    padding: 0 32px;
  }

  .back-link {
    font-size: 13px;
    color: var(--muted);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 32px;
    transition: color 0.2s;
  }

  .back-link:hover { color: var(--text); }

  .product-layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 48px;
    align-items: start;
  }

  /* Product image */
  .product-image {
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    border: 1px solid var(--border);
    border-radius: 20px;
    height: 360px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 100px;
    position: relative;
  }

  .surge-overlay {
    position: absolute;
    top: 16px;
    right: 16px;
    background: rgba(255,184,48,0.15);
    border: 1px solid rgba(255,184,48,0.3);
    color: var(--yellow);
    border-radius: 100px;
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 600;
    display: none;
  }

  /* Product info */
  .product-info {}

  .product-category {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 10px;
  }

  .product-name {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.2;
    margin-bottom: 20px;
  }

  .price-section { margin-bottom: 24px; }

  .current-price {
    font-size: 36px;
    font-weight: 700;
    color: var(--accent);
  }

  .base-price {
    font-size: 16px;
    color: var(--muted);
    text-decoration: line-through;
    margin-left: 12px;
  }

  .surge-info {
    display: none;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
    background: rgba(255,184,48,0.08);
    border: 1px solid rgba(255,184,48,0.15);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--yellow);
  }

  .stock-section {
    margin-bottom: 24px;
    padding: 16px;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: 10px;
  }

  .stock-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .stock-value { font-size: 15px; font-weight: 600; }
  .stock-value.ok { color: var(--green); }
  .stock-value.low { color: var(--yellow); }
  .stock-value.out { color: var(--accent); }

  /* Quantity selector */
  .qty-section {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }

  .qty-label { font-size: 13px; color: var(--muted); }

  .qty-control {
    display: flex;
    align-items: center;
    gap: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .qty-btn {
    width: 36px; height: 36px;
    background: transparent;
    border: none;
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }

  .qty-btn:hover { background: rgba(255,255,255,0.05); }

  .qty-value {
    width: 48px;
    text-align: center;
    font-size: 15px;
    font-weight: 600;
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    padding: 8px 0;
  }

  .add-btn {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Segoe UI', sans-serif;
    transition: opacity 0.2s;
    margin-bottom: 12px;
  }

  .add-btn:hover { opacity: 0.85; }
  .add-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Features */
  .features {
    margin-top: 32px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .feature {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: var(--muted);
  }

  .feature-icon { font-size: 16px; }

  /* Recommendations */
  .recommendations {
    margin-top: 64px;
  }

  .rec-title {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 20px;
  }

  .rec-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 16px;
  }

  .rec-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s;
  }

  .rec-card:hover { transform: translateY(-2px); border-color: var(--accent); }

  .rec-img {
    height: 100px;
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
  }

  .rec-body { padding: 12px; }
  .rec-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
  .rec-price { font-size: 14px; color: var(--accent); font-weight: 700; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 20px;
    font-size: 13px;
    opacity: 0;
    pointer-events: none;
    z-index: 999;
    transition: opacity 0.3s, transform 0.3s;
    transform: translateY(10px);
  }

  .toast.show { opacity: 1; pointer-events: auto; transform: translateY(0); }
  .toast.success { border-color: var(--green); color: var(--green); }
  .toast.error { border-color: var(--accent); color: var(--accent); }

  @media (max-width: 768px) {
    .product-layout { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<nav class="navbar">
  <a class="logo" href="/shop">⚡ ShopIQ</a>
  <div style="display:flex;gap:12px">
    <a href="/cart-page" class="nav-btn outline">🛒 Cart</a>
  </div>
</nav>

<div class="content">
  <a href="/shop" class="back-link">← Back to Shop</a>

  <div class="product-layout" id="productLayout">
    <div style="text-align:center;padding:40px;color:#52546a;grid-column:1/-1">
      Loading product...
    </div>
  </div>

  <!-- Recommendations -->
  <div class="recommendations" id="recommendations" style="display:none">
    <div class="rec-title">🤖 Customers Also Bought</div>
    <div class="rec-grid" id="recGrid"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const BASE = 'http://localhost:8000';
  const token = localStorage.getItem('token');
  let quantity = 1;
  let currentProduct = null;

  // Get product ID from URL
  var params = new URLSearchParams(window.location.search);
  var productId = params.get('id');

  if (!productId) window.location.href = '/shop';

  let toastTimer = null;
  function showToast(msg, type) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + (type || 'success');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function() { t.classList.remove('show'); }, 3000);
  }

  function updateQty(change) {
    quantity = Math.max(1, Math.min(quantity + change, currentProduct ? currentProduct.stock : 10));
    document.getElementById('qtyValue').textContent = quantity;
  }

  async function loadProduct() {
    try {
      var res = await fetch(BASE + '/products/' + productId);
      var p = await res.json();
      currentProduct = p;

      var stockClass = p.stock === 0 ? 'out' : p.stock < 5 ? 'low' : 'ok';
      var stockText = p.stock === 0 ? 'Out of Stock' : p.stock < 5 ? 'Only ' + p.stock + ' left!' : p.stock + ' in stock';
      var isSurging = p.is_surging;
      var currentPrice = p.current_price || p.price || 0;
      var basePrice = p.base_price || p.price || 0;

      document.title = 'ShopIQ — ' + p.name;

      document.getElementById('productLayout').innerHTML =
        '<div class="product-image">' +
        '📦' +
        (isSurging ? '<div class="surge-overlay" style="display:block">🔥 High Demand +' + (p.surge_percentage || 0) + '%</div>' : '') +
        '</div>' +
        '<div class="product-info">' +
        '<div class="product-category">' + (p.category || 'General') + '</div>' +
        '<div class="product-name">' + p.name + '</div>' +
        '<div class="price-section">' +
        '<span class="current-price">&#8377;' + currentPrice.toFixed(2) + '</span>' +
        (isSurging ? '<span class="base-price">&#8377;' + basePrice.toFixed(2) + '</span>' : '') +
        '</div>' +
        (isSurging ? '<div class="surge-info" style="display:flex">🔥 High demand! Price increased by ' + (p.surge_percentage || 0) + '%</div>' : '') +
        '<div class="stock-section">' +
        '<div class="stock-label">Availability</div>' +
        '<div class="stock-value ' + stockClass + '">' + stockText + '</div>' +
        '</div>' +
        '<div class="qty-section">' +
        '<span class="qty-label">Quantity:</span>' +
        '<div class="qty-control">' +
        '<button class="qty-btn" onclick="updateQty(-1)">−</button>' +
        '<div class="qty-value" id="qtyValue">1</div>' +
        '<button class="qty-btn" onclick="updateQty(1)">+</button>' +
        '</div>' +
        '</div>' +
        '<button class="add-btn" ' + (p.stock === 0 ? 'disabled' : '') + ' onclick="addToCart()">' +
        (p.stock === 0 ? 'Out of Stock' : '🛒 Add to Cart') +
        '</button>' +
        '<div class="features">' +
        '<div class="feature"><span class="feature-icon">🚚</span> Free shipping on all orders</div>' +
        '<div class="feature"><span class="feature-icon">↩️</span> Easy 30-day returns</div>' +
        '<div class="feature"><span class="feature-icon">🔒</span> Secure checkout</div>' +
        '<div class="feature"><span class="feature-icon">⚡</span> Real-time surge pricing</div>' +
        '</div>' +
        '</div>';

      loadRecommendations();
    } catch(e) {
      document.getElementById('productLayout').innerHTML =
        '<div style="text-align:center;padding:40px;color:#52546a;grid-column:1/-1">Could not load product</div>';
    }
  }

  async function addToCart() {
    if (!token) {
      showToast('Please login to add to cart', 'error');
      setTimeout(function() { window.location.href = '/login-page'; }, 1500);
      return;
    }

    try {
      var res = await fetch(BASE + '/cart/', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({ product_id: parseInt(productId), quantity: quantity })
      });
      var data = await res.json();
      if (data.id) {
        showToast('✓ Added to cart!');
      } else {
        showToast(data.detail || 'Could not add to cart', 'error');
      }
    } catch(e) {
      showToast('Error adding to cart', 'error');
    }
  }

  async function loadRecommendations() {
    try {
      var res = await fetch(BASE + '/recommendations/product/' + productId);
      var recs = await res.json();
      if (recs.length) {
        document.getElementById('recommendations').style.display = 'block';
        document.getElementById('recGrid').innerHTML = recs.map(function(r) {
          return '<div class="rec-card" onclick="window.location.href=\'/product-page?id=' + r.id + '\'">' +
            '<div class="rec-img">📦</div>' +
            '<div class="rec-body">' +
            '<div class="rec-name">' + r.name + '</div>' +
            '<div class="rec-price">&#8377;' + (r.price || 0).toFixed(2) + '</div>' +
            '</div></div>';
        }).join('');
      }
    } catch(e) {}
  }

  loadProduct();
</script>
</body>
</html>
